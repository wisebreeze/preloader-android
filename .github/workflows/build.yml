name: Build Preloader

on:
  push:
    branches: [ main, master, develop ]
    paths-ignore:
      - '**.md'
      - '**.txt'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build for ${{ matrix.abi }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        abi: [arm64-v8a, armeabi-v7a]
      fail-fast: false

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 1

    # 安装 ccache
    - name: Install ccache
      run: sudo apt-get update && sudo apt-get install -y ccache ninja-build

    - name: Setup Android NDK
      uses: nttld/setup-ndk@v1
      id: setup-ndk
      with:
        ndk-version: r26c
        add-to-path: false
        local-cache: true

    - name: Cache CMake build
      uses: actions/cache@v4
      id: cmake-cache
      with:
        path: |
          build/${{ matrix.abi }}/CMakeCache.txt
          build/${{ matrix.abi }}/CMakeFiles
        key: ${{ runner.os }}-${{ matrix.abi }}-cmake-${{ hashFiles('CMakeLists.txt') }}
        restore-keys: |
          ${{ runner.os }}-${{ matrix.abi }}-cmake-

    - name: Cache ccache
      uses: actions/cache@v4
      with:
        path: ~/.ccache
        key: ${{ runner.os }}-${{ matrix.abi }}-ccache-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-${{ matrix.abi }}-ccache-

    - name: Configure CMake
      run: |
        cmake -B build/${{ matrix.abi }} \
          -DCMAKE_TOOLCHAIN_FILE=${{ steps.setup-ndk.outputs.ndk-path }}/build/cmake/android.toolchain.cmake \
          -DANDROID_ABI=${{ matrix.abi }} \
          -DANDROID_PLATFORM=android-24 \
          -DANDROID_STL=c++_shared \
          -G Ninja \
          -DCMAKE_BUILD_TYPE=Release
      env:
        CCACHE_DIR: ~/.ccache

    - name: Build
      run: |
        cmake --build build/${{ matrix.abi }} --config Release --parallel $(nproc)
      env:
        CCACHE_DIR: ~/.ccache

    - name: Strip symbols
      run: |
        ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip \
          --strip-unneeded build/${{ matrix.abi }}/libpreloader.so || true

    - name: Upload artifact - ${{ matrix.abi }}
      uses: actions/upload-artifact@v4
      with:
        name: preloader-${{ matrix.abi }}
        path: build/${{ matrix.abi }}/libpreloader.so
        retention-days: 30

    - name: Upload headers artifact
      if: matrix.abi == 'arm64-v8a'
      uses: actions/upload-artifact@v4
      with:
        name: preloader-headers
        path: |
          src/pl/*.h
          src/pl/api/*.h
          src/pl/api/memory/*.h
        retention-days: 90
