name: Build Preloader

on:
  push:
    branches: [ main, master, develop ]
    paths-ignore:
      - '**.md'
      - '**.txt'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build for ${{ matrix.abi }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        abi: [arm64-v8a, armeabi-v7a]
      fail-fast: false

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 1

    - name: Install build tools
      run: |
        sudo apt-get update
        sudo apt-get install -y ninja-build

    - name: Setup Android NDK
      uses: android-actions/setup-android@v3
      with:
        log-accept-android-sdk-license: true

    - name: Set NDK path
      run: |
        echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/$(ls $ANDROID_HOME/ndk)" >> $GITHUB_ENV
        echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/$(ls $ANDROID_HOME/ndk)" >> $GITHUB_ENV

    - name: Cache CMake build
      uses: actions/cache@v4
      with:
        path: |
          build/${{ matrix.abi }}/CMakeCache.txt
          build/${{ matrix.abi }}/CMakeFiles
        key: ${{ runner.os }}-${{ matrix.abi }}-cmake-${{ hashFiles('CMakeLists.txt') }}
        restore-keys: |
          ${{ runner.os }}-${{ matrix.abi }}-cmake-

    - name: Configure CMake
      run: |
        cmake -B build/${{ matrix.abi }} \
          -DCMAKE_TOOLCHAIN_FILE=${ANDROID_NDK_ROOT}/build/cmake/android.toolchain.cmake \
          -DANDROID_ABI=${{ matrix.abi }} \
          -DANDROID_PLATFORM=android-24 \
          -DANDROID_STL=c++_shared \
          -G Ninja \
          -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: |
        cmake --build build/${{ matrix.abi }} --config Release --parallel $(nproc)

    - name: Strip symbols
      run: |
        ${ANDROID_NDK_ROOT}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip \
          --strip-unneeded build/${{ matrix.abi }}/libpreloader.so 2>/dev/null || true

    - name: Upload artifact - ${{ matrix.abi }}
      uses: actions/upload-artifact@v4
      with:
        name: preloader-${{ matrix.abi }}
        path: build/${{ matrix.abi }}/libpreloader.so
        retention-days: 30
        if-no-files-found: error

    - name: Upload headers
      if: matrix.abi == 'arm64-v8a'
      uses: actions/upload-artifact@v4
      with:
        name: preloader-headers
        path: |
          src/pl/*.h
          src/pl/api/*.h
          src/pl/api/memory/*.h
        retention-days: 90

  # Release job - 只在打 tag 时运行
  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Prepare release package
      run: |
        mkdir -p release/lib release/include
        
        # 复制库文件
        cp artifacts/preloader-arm64-v8a/libpreloader.so release/lib/preloader-arm64-v8a.so
        cp artifacts/preloader-armeabi-v7a/libpreloader.so release/lib/preloader-armeabi-v7a.so
        
        # 复制头文件
        cp -r artifacts/preloader-headers/* release/include/
        
        # 创建压缩包
        cd release
        tar -czf ../preloader-android-${{ github.ref_name }}.tar.gz .
        cd ..
        
        # 也创建一个 zip 包（方便 Windows 用户）
        cd release
        zip -r ../preloader-android-${{ github.ref_name }}.zip .
        cd ..
        
        # 计算 checksum
        sha256sum preloader-android-${{ github.ref_name }}.tar.gz > preloader-android-${{ github.ref_name }}.tar.gz.sha256
        sha256sum preloader-android-${{ github.ref_name }}.zip > preloader-android-${{ github.ref_name }}.zip.sha256

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          preloader-android-${{ github.ref_name }}.tar.gz
          preloader-android-${{ github.ref_name }}.tar.gz.sha256
          preloader-android-${{ github.ref_name }}.zip
          preloader-android-${{ github.ref_name }}.zip.sha256
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
