name: Build Preloader

on:
  push:
    branches: [ main, master, develop ]
    paths-ignore:
      - '**.md'
      - '**.txt'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    name: Build for ${{ matrix.abi }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        abi: [arm64-v8a, armeabi-v7a]
      fail-fast: false  # 一个失败不影响另一个

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 1  # 只获取最新提交，减少时间

    - name: Setup Android NDK
      uses: nttld/setup-ndk@v1
      id: setup-ndk
      with:
        ndk-version: r26c
        add-to-path: false
        local-cache: true

    - name: Cache CMake build
      uses: actions/cache@v4
      id: cmake-cache
      with:
        path: |
          build/${{ matrix.abi }}/CMakeCache.txt
          build/${{ matrix.abi }}/CMakeFiles
          build/${{ matrix.abi }}/**/*.o
          build/${{ matrix.abi }}/**/*.a
        key: ${{ runner.os }}-${{ matrix.abi }}-cmake-${{ hashFiles('CMakeLists.txt', 'src/**/*.cpp', 'src/**/*.h') }}
        restore-keys: |
          ${{ runner.os }}-${{ matrix.abi }}-cmake-
          ${{ runner.os }}-cmake-

    - name: Cache Ninja build
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/ninja
          build/${{ matrix.abi }}/.ninja_deps
          build/${{ matrix.abi }}/.ninja_log
        key: ${{ runner.os }}-${{ matrix.abi }}-ninja-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-${{ matrix.abi }}-ninja-

    - name: Cache ccache
      uses: actions/cache@v4
      with:
        path: ~/.ccache
        key: ${{ runner.os }}-${{ matrix.abi }}-ccache-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-${{ matrix.abi }}-ccache-

    - name: Configure CMake
      run: |
        cmake -B build/${{ matrix.abi }} \
          -DCMAKE_TOOLCHAIN_FILE=${{ steps.setup-ndk.outputs.ndk-path }}/build/cmake/android.toolchain.cmake \
          -DANDROID_ABI=${{ matrix.abi }} \
          -DANDROID_PLATFORM=android-24 \
          -DANDROID_STL=c++_shared \
          -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
          -DCMAKE_C_COMPILER_LAUNCHER=ccache
      env:
        CCACHE_DIR: ~/.ccache
        CCACHE_MAXSIZE: 500M

    - name: Build
      run: |
        cmake --build build/${{ matrix.abi }} --config Release --parallel $(nproc)

    - name: Strip symbols (减少体积)
      run: |
        ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip \
          --strip-unneeded build/${{ matrix.abi }}/libpreloader.so

    - name: Upload artifact - ${{ matrix.abi }}
      uses: actions/upload-artifact@v4
      with:
        name: preloader-${{ matrix.abi }}
        path: build/${{ matrix.abi }}/libpreloader.so
        retention-days: 30
        compression-level: 9

    - name: Upload headers artifact
      if: matrix.abi == 'arm64-v8a'  # 只上传一次头文件
      uses: actions/upload-artifact@v4
      with:
        name: preloader-headers
        path: |
          src/pl/*.h
          src/pl/api/*.h
          src/pl/api/memory/*.h
        retention-days: 90

  # 可选：创建 Release
  create-release:
    name: Create Release Package
    needs: [build]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
    
    - name: Create release package
      run: |
        mkdir release-package
        cp artifacts/preloader-arm64-v8a/libpreloader.so release-package/preloader-arm64-v8a.so
        cp artifacts/preloader-armeabi-v7a/libpreloader.so release-package/preloader-armeabi-v7a.so
        cp -r artifacts/preloader-headers/* release-package/
        tar -czf preloader-release.tar.gz -C release-package .
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: preloader-release.tar.gz
        draft: false
        prerelease: false
        generate_release_notes: true
